<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatty — AI Proxy Cockpit</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="cockpit">
        <main class="chat-panel">
            <div class="chat-header">
                <div class="chat-title">Chatty</div>
                <div class="chat-header-meta">
                    <div class="status-text" id="connection-status">ready • chatty backend</div>
                    <button type="button" class="settings-btn" id="settings-toggle-btn" aria-expanded="false" aria-controls="settings-panel">
                        Settings
                    </button>
                </div>
            </div>

            <section class="settings-panel" id="settings-panel" hidden>
                <form id="settings-form" class="settings-form" novalidate>
                    <label class="settings-field">
                        <span>Backend URL</span>
                        <input id="settings-base-url" name="baseUrl" type="url" placeholder="https://chatty-be-is9h.onrender.com">
                    </label>
                    <label class="settings-field">
                        <span>API Key (optional)</span>
                        <input id="settings-api-key" name="apiKey" type="password" placeholder="CHATTY_API_KEY" autocomplete="new-password">
                    </label>
                    <div class="settings-field">
                        <span>Web search mode</span>
                        <select id="settings-web-search-mode" name="webSearchMode">
                            <option value="auto">auto</option>
                            <option value="on">on</option>
                            <option value="off">off</option>
                        </select>
                    </div>
                    <label class="settings-checkbox">
                        <input id="settings-stream-enabled" name="streamEnabled" type="checkbox" checked>
                        <span>Enable streaming responses</span>
                    </label>
                    <div class="settings-actions">
                        <button type="submit" class="send-btn">Save</button>
                        <button type="button" class="settings-reset-btn" id="settings-reset-btn">Reset</button>
                    </div>
                </form>
            </section>

            <div class="messages" id="messages" aria-live="polite">
                <div class="message assistant">
                    <div class="message-content" id="empty-state-message">
                        Ask anything to start chatting.
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form class="input-wrapper" id="chat-form">
                    <input id="chat-input" type="text" placeholder="Ask anything... web search optional" autocomplete="off">
                    <button type="submit" class="send-btn" id="send-btn">Send</button>
                </form>
                <div class="input-hint" id="input-hint">Press Enter to send</div>
                </div>
        </main>

        <aside class="metrics-panel" aria-label="Request metrics">
            <div class="metric-group">
                <div class="metric-label">Model</div>
                <div class="metric-value" id="metric-model">--</div>
            </div>

            <div class="metric-group">
                <div class="metric-label">Latency</div>
                <div class="metric-value">
                    <span class="latency-value" id="metric-latency">--</span><span class="metric-unit">ms</span>
                </div>
                <div class="stream-status" id="metric-stream-status">
                    <div class="stream-indicator" id="metric-stream-indicator"></div>
                    <span id="metric-stream-label">idle</span>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-label">Tokens / Second</div>
                <div class="metric-value">
                    <span class="tokens-value" id="metric-tokens-rate">--</span><span class="metric-unit">tok/s</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="metric-progress-fill"></div>
                    </div>
                    <div class="progress-label">
                        <span>Total Tokens</span>
                        <span id="metric-total-tokens">--</span>
                    </div>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-label">Web Search</div>
                <div class="metric-value metric-value--success" id="metric-web-search">auto</div>
                <div class="info-box">
                    <div class="info-label">Results Found</div>
                    <span id="metric-web-search-results">0 sources indexed</span>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-label">Request ID</div>
                <div class="request-id" id="metric-request-id">
                    <span class="request-id-label">UUID</span>
                    <span id="metric-request-id-value">--</span>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-label">Server Timing</div>
                <div class="info-box">
                    <div class="timing-row">
                        <span>Processing</span>
                        <span class="timing-value" id="metric-processing-time">--</span>
                    </div>
                    <div class="timing-row">
                        <span>Response</span>
                        <span class="timing-value" id="metric-response-time">--</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
